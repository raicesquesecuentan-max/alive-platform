name: alive_voice_app
description: Aplicación de voz accesible para personas con discapacidad visual en turismo.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.0.0

dependencies:
  flutter:
    sdk: flutter
  
  # Accesibilidad y Voz
  flutter_tts: ^0.14.0
  speech_to_text: ^6.3.0
  audio_session: ^0.1.13
  
  # UI Accesible
  flutter_semantic_web: ^0.1.0
  accessibility: ^0.1.0
  
  # Conectividad y BLE
  flutter_blue_plus: ^1.31.0
  connectivity_plus: ^5.0.0
  
  # Almacenamiento
  sqflite: ^2.3.0
  path_provider: ^2.1.0
  
  # API y Networking
  http: ^1.1.0
  dio: ^5.3.0
  
  # State Management
  provider: ^6.0.0
  riverpod: ^2.4.0
  
  # Notificaciones
  flutter_local_notifications: ^16.0.0
  firebase_messaging: ^14.7.0
  
  # Localización
  intl: ^0.19.0
  easy_localization: ^3.0.0
  
  # Logging
  logger: ^2.0.0
  
  # Geolocalización
  geolocator: ^9.0.0
  
  # Mapas accesibles
  google_maps_flutter: ^2.5.0
  
  # Reproducción de Audio
  just_audio: ^0.9.0
  audio_players: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  test: ^1.24.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/audio/
    - assets/voices/
    - assets/translations/
    - assets/icons/
  
  fonts:
    - family: OpenSans
      fonts:
        - asset: assets/fonts/OpenSans-Regular.ttf
        - asset: assets/fonts/OpenSans-Bold.ttf
          weight: 700
